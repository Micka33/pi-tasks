name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SEMVER='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

          if [[ ! "$VERSION" =~ $SEMVER ]]; then
            echo "Invalid semver tag: $TAG" >&2
            echo "Expected tags like v1.2.3 or v1.2.3-beta.1" >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Typecheck and coverage
        run: npm run ci

      - name: Pack release artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          npm pack --pack-destination release

          shopt -s nullglob
          tarballs=(release/*.tgz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "Expected exactly one release tarball, found ${#tarballs[@]}" >&2
            printf ' - %s\n' "${tarballs[@]}" >&2
            exit 1
          fi

          TARBALL="$(basename "${tarballs[0]}")"
          sha256sum "release/$TARBALL" > "release/$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "release/$TARBALL" --access public --provenance

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail

          args=(
            release create "$TAG"
            "release/$TARBALL"
            "release/$TARBALL.sha256"
            --title "pi-tasks $VERSION"
            --generate-notes
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
