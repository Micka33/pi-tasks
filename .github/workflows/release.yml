name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  prepare-release:
    name: Prepare release artifact
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      package_name: ${{ steps.package.outputs.name }}
      tarball: ${{ steps.pack.outputs.tarball }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release prerequisites
        id: package
        shell: bash
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${NPM_ACCESS_TOKEN:-}" ]]; then
            echo "Missing required secret: NPM_ACCESS_TOKEN" >&2
            exit 1
          fi

          PACKAGE_NAME="$(node -p "require('./package.json').name ?? ''")"
          if [[ -z "$PACKAGE_NAME" ]]; then
            echo "Missing required package.json name" >&2
            exit 1
          fi

          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SEMVER='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

          if [[ ! "$VERSION" =~ $SEMVER ]]; then
            echo "Invalid semver tag: $TAG" >&2
            echo "Expected tags like v1.2.3 or v1.2.3-beta.1" >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Set package version from tag
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Run CI
        run: |
          npm run ci

      - name: Pack release artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          npm pack --pack-destination release

          shopt -s nullglob
          tarballs=(release/*.tgz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "Expected exactly one release tarball, found ${#tarballs[@]}" >&2
            printf ' - %s\n' "${tarballs[@]}" >&2
            exit 1
          fi

          TARBALL="$(basename "${tarballs[0]}")"
          sha256sum "release/$TARBALL" > "release/$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifact
          path: release/*
          if-no-files-found: error

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release-artifact
          path: release

      - name: Publish npm package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          TARBALL: ${{ needs.prepare-release.outputs.tarball }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package_name }}
        run: |
          set -euo pipefail

          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published to npm; skipping npm publish."
          else
            npm publish "./release/$TARBALL" --access public --provenance
          fi

          if [[ "$PRERELEASE" == "false" ]]; then
            npm dist-tag add "$PACKAGE_NAME@$VERSION" latest
          fi

          for attempt in {1..12}; do
            if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
              break
            fi

            if [[ "$attempt" == "12" ]]; then
              echo "npm package metadata did not become visible after publish" >&2
              exit 1
            fi

            sleep 10
          done

  publish-github-package:
    name: Publish GitHub package
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          registry-url: "https://npm.pkg.github.com"
          scope: "@micka33"

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release-artifact
          path: release

      - name: Publish GitHub package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          TARBALL: ${{ needs.prepare-release.outputs.tarball }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package_name }}
        run: |
          set -euo pipefail

          REGISTRY="https://npm.pkg.github.com"

          if npm view "$PACKAGE_NAME@$VERSION" version --registry="$REGISTRY" >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published to GitHub Packages; skipping publish."
          else
            npm publish "./release/$TARBALL" --registry="$REGISTRY" --access public
          fi

          npm dist-tag add "$PACKAGE_NAME@$VERSION" latest --registry="$REGISTRY"

          for attempt in {1..12}; do
            if npm view "$PACKAGE_NAME@$VERSION" version --registry="$REGISTRY" && npm view "$PACKAGE_NAME" dist-tags.latest --registry="$REGISTRY"; then
              break
            fi

            if [[ "$attempt" == "12" ]]; then
              echo "GitHub Packages metadata did not become visible after publish" >&2
              exit 1
            fi

            sleep 10
          done

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release-artifact
          path: release

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
          TARBALL: ${{ needs.prepare-release.outputs.tarball }}
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "release/$TARBALL" "release/$TARBALL.sha256" --clobber
          else
            args=(
              release create "$TAG"
              "release/$TARBALL"
              "release/$TARBALL.sha256"
              --title "$PACKAGE_NAME $VERSION"
              --generate-notes
            )

            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi

            gh "${args[@]}"
          fi

  update-latest-tag:
    name: Update latest git tag
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.prerelease == 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update latest git tag
        shell: bash
        run: |
          set -euo pipefail
          git tag -f latest "$(git rev-parse HEAD)"
          git push --force origin refs/tags/latest
