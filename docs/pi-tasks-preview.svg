<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.14" cy="0.04" r="0.72">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0.9" cy="0.9" r="0.62">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.27"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="panelShadow" x="-18%" y="-25%" width="136%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>
  <rect width="1200" height="630" fill="url(#violetGlow)"/>
  <circle cx="-40" cy="-36" r="270" fill="#0891b2" opacity="0.11"/>
  <circle cx="1138" cy="648" r="250" fill="#7c3aed" opacity="0.16"/>

  <text x="84" y="148" font-family="Menlo, Monaco, Consolas, monospace" font-size="62" font-weight="800" fill="#f8fafc">pi-tasks</text>
  <text x="88" y="196" font-family="Menlo, Monaco, Consolas, monospace" font-size="28" fill="#cbd5e1">One shared task list for agents.</text>

  <g transform="translate(76 254)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="1048" height="272" rx="28" fill="#050b15" stroke="#334155" stroke-width="3"/>
    <rect x="28" y="28" width="992" height="216" rx="18" fill="#08111f" stroke="#1e293b" stroke-width="2"/>

    <g transform="translate(58 76)" font-family="Menlo, Monaco, Consolas, monospace" font-size="21" xml:space="preserve">
